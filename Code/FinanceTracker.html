<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker by Gülyabani</title>
    <link rel="stylesheet" href="Style1.css">
</head>
<body>
    <div id="MainDiv">
        <div id="TotalDiv">
            <h2 id="TotalText">Total Money: </h2>
        </div>
        <div id="NotesDiv">
            <h2>Notes</h2>
            <ul id="NotesList">
                
            </ul>
        </div>
        <div id="AddRemoveDiv">
            <h2>Income/Expense</h2>
        </div>
        <div id="GraphDiv">
            <h2>Graph(Negative values are not supported, sorry people in debt)</h2>
            <div id="GraphDiv2">
                <svg id="GraphSVG" width="100%" height="100px">
                    <path d="M 0 0" fill="transparent" stroke="rgb(244, 30, 123)" stroke-width="3px" id="GraphPath">
                </svg>
                <span>
                <p id="GraphMinimum">0$</p>
                <p id="GraphMaximum"></p>
                </span>
            </div>
        </div>
        <div id="HistoryDiv">
            <h2>History</h2>
            <ul id="HistoryList">

            </ul>
        </div>
    </div>


<!--Extra Boxes-->
    <div id="EditDiv">
        <input type="number" placeholder="Please enter some value" id="EditInput" max="999999999" autocomplete="off">
    </div>
    <div id="NoteAddDiv">
        <input type="text" placeholder="Example: Do not spend money on action figures" id="NoteAddInput" autocomplete="off">
    </div>
    <div id="IncomeExpenseDiv">
        <input type="number" min="0" placeholder="Negative numbers are not accepted" id="IncomeInput" autocomplete="off">
        <input type="number" max="0" placeholder="Positive numbers are not accepted" id="ExpenseInput" autocomplete="off">
    </div>

<!--Overlay-->
    <div id="Overlay">
    </div>
    <script src="FinanceTracker.js"></script>
</body>
</html>
